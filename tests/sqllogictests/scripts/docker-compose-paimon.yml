services:
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.91
    network_mode: "host"
    environment:
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=password
      - RUSTFS_SERVER_DOMAINS=rustfs
      - RUSTFS_ADDRESS=0.0.0.0:9010
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9011
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9010/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  mc:
    depends_on:
      - rustfs
    image: minio/mc:RELEASE.2024-03-07T00-31-49Z
    network_mode: "host"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc config host add rustfs http://127.0.0.1:9010 admin password) do echo '...waiting...' && sleep 1; done; /usr/bin/mc rm -r --force rustfs/paimon-warehouse || true; /usr/bin/mc mb rustfs/paimon-warehouse; /usr/bin/mc policy set public rustfs/paimon-warehouse; tail -f /dev/null "

  paimon-rest:
    image: ghcr.io/apache/paimon/paimon-rest-catalog:1.0.0
    network_mode: "host"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - PAIMON_REST_CATALOG_WAREHOUSE=s3://paimon-warehouse/
      - PAIMON_REST_CATALOG_S3_ENDPOINT=http://127.0.0.1:9010
      - PAIMON_REST_CATALOG_S3_PATH_STYLE_ACCESS=true
    depends_on:
      - mc
    ports:
      - "9088:9088"

  paimon-driver:
    depends_on:
      - mc
    image: apache/spark:3.5.3
    network_mode: "host"
    volumes:
      - ./prepare_paimon_test_data.py:/opt/prepare_paimon_test_data.py:ro
    environment:
      - PAIMON_WAREHOUSE=s3://paimon-warehouse/
      - PAIMON_S3_ENDPOINT=http://127.0.0.1:9010
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/bash -c "pip install --quiet pyspark==3.5.3 && python3 /opt/prepare_paimon_test_data.py && tail -f /dev/null"

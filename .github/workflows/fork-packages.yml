name: Fork Packages

# Lightweight packaging CI for Pandas886/databend-fork.
# Builds deployable tar.gz for:
#   - aarch64-apple-darwin  (ARM Mac)
#   - x86_64-unknown-linux-gnu (Linux x86_64)
#
# Does not use upstream self-hosted AWS runners.
#
# Speed notes (vs upstream release profile):
# - LTO off, higher codegen-units, no debuginfo → much faster compile/link
# - Optional platform filter so you can build only what you need
# - One cargo invocation per platform (all bins together)

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
          Package version string used in tarball names.
          Leave empty to use fork-<shortsha>.
        required: false
        type: string
        default: ""
      platforms:
        description: Platforms to build
        required: false
        type: choice
        options:
          - both
          - linux
          - macos
        default: both
      create_release:
        description: Upload tarballs to a GitHub Release (draft)
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

env:
  BUILD_PROFILE: release
  RUNNER_PROVIDER: github
  # Faster packaging profile (still release-optimized, not peak-perf).
  # Upstream release uses lto=thin, codegen-units=1, debug=1, opt-level=s.
  CARGO_PROFILE_RELEASE_LTO: "off"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_PROFILE_RELEASE_OPT_LEVEL: "3"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.meta.outputs.sha }}
      package_matrix: ${{ steps.meta.outputs.package_matrix }}
      build_macos: ${{ steps.meta.outputs.build_macos }}
      build_linux: ${{ steps.meta.outputs.build_linux }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve version and platforms
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA}"
          short_sha="${sha:0:10}"
          version="${{ inputs.version }}"
          if [[ -z "${version}" ]]; then
            version="fork-${short_sha}"
          fi

          platforms="${{ inputs.platforms }}"
          build_macos=false
          build_linux=false
          matrix_items=()
          case "${platforms}" in
            both)
              build_macos=true
              build_linux=true
              matrix_items+=('{"target":"aarch64-apple-darwin"}')
              matrix_items+=('{"target":"x86_64-unknown-linux-gnu"}')
              ;;
            macos)
              build_macos=true
              matrix_items+=('{"target":"aarch64-apple-darwin"}')
              ;;
            linux)
              build_linux=true
              matrix_items+=('{"target":"x86_64-unknown-linux-gnu"}')
              ;;
            *)
              echo "Unknown platforms: ${platforms}" >&2
              exit 1
              ;;
          esac

          package_matrix="{\"include\":[$(IFS=,; echo "${matrix_items[*]}")]}"

          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_macos=${build_macos}" >> "$GITHUB_OUTPUT"
          echo "build_linux=${build_linux}" >> "$GITHUB_OUTPUT"
          echo "package_matrix=${package_matrix}" >> "$GITHUB_OUTPUT"

          {
            echo "## Prepare"
            echo "- version: \`${version}\`"
            echo "- sha: \`${sha}\`"
            echo "- platforms: \`${platforms}\`"
            echo "- package matrix: \`${package_matrix}\`"
            echo "- fast profile: LTO=off, codegen-units=16, debug=0, opt-level=3"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup previous packages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "## Cleanup previous packages"
          } >> "$GITHUB_STEP_SUMMARY"

          deleted_releases=0
          # Delete prior fork package releases (and tags) so assets do not accumulate.
          while read -r tag; do
            [[ -z "${tag}" ]] && continue
            echo "Deleting release: ${tag}"
            if gh release delete "${tag}" --repo "${REPO}" --yes --cleanup-tag; then
              deleted_releases=$((deleted_releases + 1))
            else
              echo "Warn: failed to delete release ${tag}" >&2
            fi
          done < <(
            gh api --paginate "repos/${REPO}/releases" \
              --jq '.[] | select(.tag_name | test("^fork-")) | .tag_name'
          )

          deleted_artifacts=0
          page=1
          while true; do
            resp="$(gh api "repos/${REPO}/actions/artifacts?per_page=100&page=${page}")"
            count="$(echo "${resp}" | jq '.artifacts | length')"
            if [[ "${count}" -eq 0 ]]; then
              break
            fi

            while read -r id name; do
              [[ -z "${id}" ]] && continue
              echo "Deleting artifact: ${name} (id=${id})"
              if gh api -X DELETE "repos/${REPO}/actions/artifacts/${id}"; then
                deleted_artifacts=$((deleted_artifacts + 1))
              else
                echo "Warn: failed to delete artifact ${name} (id=${id})" >&2
              fi
            done < <(
              echo "${resp}" | jq -r '
                .artifacts[]
                | select(.expired | not)
                | select(
                    .name
                    | test("^(release-|databend-fork-|databend-.*-(aarch64-apple-darwin|x86_64-unknown-linux-gnu)$)")
                  )
                | "\(.id) \(.name)"
              '
            )

            page=$((page + 1))
            if [[ "${page}" -gt 50 ]]; then
              echo "Warn: stopped artifact cleanup after 50 pages" >&2
              break
            fi
          done

          {
            echo "- deleted fork-* releases: ${deleted_releases}"
            echo "- deleted packaging artifacts: ${deleted_artifacts}"
          } >> "$GITHUB_STEP_SUMMARY"

  build_macos_arm:
    if: ${{ needs.prepare.outputs.build_macos == 'true' }}
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        uses: ./.github/actions/build_macos
        with:
          target: aarch64-apple-darwin
          artifacts: query,meta,metactl
          upload: "true"

  build_linux_x86:
    if: ${{ needs.prepare.outputs.build_linux == 'true' }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h
      - name: Build
        uses: ./.github/actions/build_linux
        with:
          sha: ${{ needs.prepare.outputs.sha }}
          target: x86_64-unknown-linux-gnu
          artifacts: query,meta,metactl
          features: default
          category: default
          trim_debug: "true"
          upload: "true"

  create_release:
    if: ${{ always() && inputs.create_release && needs.prepare.result == 'success' && (needs.build_macos_arm.result == 'success' || needs.build_macos_arm.result == 'skipped') && (needs.build_linux_x86.result == 'success' || needs.build_linux_x86.result == 'skipped') && (needs.build_macos_arm.result == 'success' || needs.build_linux_x86.result == 'success') }}
    needs:
      - prepare
      - build_macos_arm
      - build_linux_x86
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists"
            exit 0
          fi
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --target "${SHA}" \
            --title "${VERSION}" \
            --notes "Fork deploy packages (fast profile: no LTO). Platforms selected at build time." \
            --draft

  package:
    needs:
      - prepare
      - build_macos_arm
      - build_linux_x86
      - create_release
    if: ${{ always() && needs.prepare.result == 'success' && (needs.build_macos_arm.result == 'success' || needs.build_macos_arm.result == 'skipped') && (needs.build_linux_x86.result == 'success' || needs.build_linux_x86.result == 'skipped') && (needs.build_macos_arm.result == 'success' || needs.build_linux_x86.result == 'success') && (needs.create_release.result == 'success' || needs.create_release.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.package_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Download binaries
        uses: ./.github/actions/artifact_download
        with:
          sha: ${{ needs.prepare.outputs.sha }}
          target: ${{ matrix.target }}
          category: default
          path: distro/bin
          artifacts: query,meta,metactl
      - name: Download BendSQL (optional)
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          # Best-effort: packaging still succeeds if bendsql asset is missing.
          release="$(gh api repos/databendlabs/bendsql/releases/latest --jq .tag_name)"
          url="https://github.com/databendlabs/bendsql/releases/download/${release}/bendsql-${target}.tar.gz"
          if curl -fsSL "$url" -o /tmp/bendsql.tar.gz; then
            tar -xzf /tmp/bendsql.tar.gz -C distro/bin
            echo "Bundled bendsql ${release}"
          else
            echo "Skip bendsql for ${target}: download failed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Pack tar.gz
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          version="${{ needs.prepare.outputs.version }}"
          pkg_name="databend-${version}-${target}"

          mkdir -p distro/{configs,systemd,scripts}
          cp ./scripts/distribution/systemd/databend-* distro/systemd/
          cp ./scripts/distribution/configs/databend-* distro/configs/
          cp ./scripts/distribution/release-readme.txt distro/readme.txt
          cp -r ./scripts/distribution/package-scripts/* distro/scripts/
          chmod +x distro/bin/databend-* || true

          tar -C ./distro -czvf "${pkg_name}.tar.gz" bin configs systemd scripts readme.txt
          sha256sum "${pkg_name}.tar.gz" | tee "sha256-${pkg_name}.txt"

          echo "pkg_name=${pkg_name}" >> "$GITHUB_OUTPUT"
          ls -lh "${pkg_name}.tar.gz"
      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pack.outputs.pkg_name }}
          path: |
            ${{ steps.pack.outputs.pkg_name }}.tar.gz
            sha256-${{ steps.pack.outputs.pkg_name }}.txt
          retention-days: 3
      - name: Upload to GitHub Release
        if: ${{ inputs.create_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PKG: ${{ steps.pack.outputs.pkg_name }}
        run: |
          set -euo pipefail
          gh release upload "${VERSION}" \
            --repo "${{ github.repository }}" \
            "${PKG}.tar.gz" \
            "sha256-${PKG}.txt" \
            --clobber

  # Intermediate release-* binaries are large; drop them after final packages exist.
  cleanup_build_artifacts:
    if: ${{ always() && needs.package.result == 'success' }}
    needs:
      - prepare
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Delete intermediate build artifacts for this SHA
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          deleted=0
          page=1
          prefix="release-${SHA}-"
          while true; do
            resp="$(gh api "repos/${REPO}/actions/artifacts?per_page=100&page=${page}")"
            count="$(echo "${resp}" | jq '.artifacts | length')"
            if [[ "${count}" -eq 0 ]]; then
              break
            fi

            while read -r id name; do
              [[ -z "${id}" ]] && continue
              echo "Deleting intermediate artifact: ${name} (id=${id})"
              if gh api -X DELETE "repos/${REPO}/actions/artifacts/${id}"; then
                deleted=$((deleted + 1))
              else
                echo "Warn: failed to delete ${name}" >&2
              fi
            done < <(
              echo "${resp}" | jq -r --arg p "${prefix}" '
                .artifacts[]
                | select(.expired | not)
                | select(.name | startswith($p))
                | "\(.id) \(.name)"
              '
            )

            page=$((page + 1))
            if [[ "${page}" -gt 20 ]]; then
              break
            fi
          done
          echo "Deleted intermediate artifacts: ${deleted}" >> "$GITHUB_STEP_SUMMARY"

  summary:
    if: always()
    needs:
      - prepare
      - build_macos_arm
      - build_linux_x86
      - create_release
      - package
      - cleanup_build_artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Result
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          WANT_MAC: ${{ needs.prepare.outputs.build_macos }}
          WANT_LINUX: ${{ needs.prepare.outputs.build_linux }}
          MAC: ${{ needs.build_macos_arm.result }}
          LINUX: ${{ needs.build_linux_x86.result }}
          REL: ${{ needs.create_release.result }}
          PKG: ${{ needs.package.result }}
          CLEAN: ${{ needs.cleanup_build_artifacts.result }}
        run: |
          {
            echo "## Fork Packages"
            echo "- version: \`${VERSION}\`"
            echo "- macOS ARM build: \`${MAC}\` (wanted=${WANT_MAC})"
            echo "- Linux x86_64 build: \`${LINUX}\` (wanted=${WANT_LINUX})"
            echo "- create release: \`${REL}\`"
            echo "- package: \`${PKG}\`"
            echo "- cleanup build artifacts: \`${CLEAN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          ok=true
          if [[ "${WANT_MAC}" == "true" && "${MAC}" != "success" ]]; then
            ok=false
          fi
          if [[ "${WANT_LINUX}" == "true" && "${LINUX}" != "success" ]]; then
            ok=false
          fi
          if [[ "${PKG}" != "success" ]]; then
            ok=false
          fi
          if [[ "${REL}" != "success" && "${REL}" != "skipped" ]]; then
            ok=false
          fi
          if [[ "${ok}" != "true" ]]; then
            exit 1
          fi
